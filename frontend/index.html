<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideDeck PDF — PPT to PDF Converter</title>
    <meta name="description" content="Convert PowerPoint presentations to PDF instantly. Drag, drop, and download.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <main class="glass-container">
        <header>
            <div class="logo">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
                    <path d="M8 7H11C12.6569 7 14 8.34315 14 10C14 11.6569 12.6569 13 11 13H8V7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="8 13V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>SlideDeck <span>PDF</span></h1>
            <p>Drag, drop, and convert Microsoft presentations to PDF instantly</p>
        </header>

        <div id="drop-zone" class="drop-zone">
            <div class="drop-icon">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 10V9C7 6.23858 9.23858 4 12 4C14.7614 4 17 6.23858 17 9V10C19.2091 10 21 11.7909 21 14C21 15.4806 20.1956 16.8084 19 17.5M7 10C4.79086 10 3 11.7909 3 14C3 15.4806 3.8044 16.8084 5 17.5M7 10C7.43285 10 7.84965 10.0688 8.24006 10.1959M12 12V21M12 12L15 15M12 12L9 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h3>Drop your PPT / PPTX files here</h3>
            <p>or <button class="browse-btn" onclick="document.getElementById('file-input').click()">click to browse</button></p>
            <input type="file" id="file-input" multiple accept=".ppt,.pptx" hidden>
        </div>

        <div id="file-list" class="file-list"></div>

        <div id="download-all-container" class="download-all-container">
            <button id="download-all-btn" class="download-all-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 16V17C4 18.1046 4.89543 19 6 19H18C19.1046 19 20 18.1046 20 17V16M12 15V3M12 15L8 11M12 15L16 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Download All as ZIP</span>
            </button>
        </div>

        <footer class="app-footer">
            <p>Powered by Microsoft PowerPoint</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
